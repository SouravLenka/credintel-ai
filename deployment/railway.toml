[build]
builder = "dockerfile"
dockerfile = "deployment/Dockerfile"
dockerfilePath = "deployment/Dockerfile"
buildContext = "."

[deploy]
startCommand = "gunicorn main:app -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
healthcheckPath = "/health"
healthcheckTimeout = 300

[env]
PORT = { default = "8000" }
